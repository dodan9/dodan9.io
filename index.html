<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./public/favicon.ico" type="image/x-ion" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="dodan9.io" />
    <link rel="apple-touch-icon" href="./public/logo192.png" />
    <link rel="manifest" href="./public/manifest.json" />
    <title>Dodan9</title>
    <style>
      @font-face {
        font-family: "DungGeunMo";
        src: url("./public/DungGeunMo.ttf");
      }
      body {
        margin: 0;
        padding: 0;
      }
      * {
        font-family: "DungGeunMo";

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=%REACT_APP_KAKAO_DEVELOPER_JS_KEY%&libraries=services,clusterer"
    ></script>
    <script>
      /** SPA Refresh */
      const redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
